<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Sprint - Bugs</title>
</head>
<body>

    <button onclick="gerarRelatorio()">Gerar Relatório</button>
    <br><br>

    <textarea id="relatorio" rows="15" cols="50"></textarea>

    <script>
        function gerarRelatorio() {
            let dias = Number(prompt("Quantos dias teve a Sprint?"));

            let totalBugs = 0;
            let maiorBugs = -1;
            let menorBugs = Infinity;
            let diaMaior = 0;
            let diaMenor = 0;

            let texto = "RELATÓRIO DA SPRINT\n\n";

            for (let i = 1; i <= dias; i++) {
                let bugs = Number(prompt("Quantos bugs foram encontrados no dia " + i + "?"));

                texto += "Dia " + i + ": " + bugs + " bugs\n";

                totalBugs += bugs;

                if (bugs > maiorBugs) {
                    maiorBugs = bugs;
                    diaMaior = i;
                }

                if (bugs < menorBugs) {
                    menorBugs = bugs;
                    diaMenor = i;
                }
            }

            let media = totalBugs / dias;

            texto += "\nTotal de bugs: " + totalBugs;
            texto += "\nMédia de bugs por dia: " + media.toFixed(2);
            texto += "\nDia com mais bugs: Dia " + diaMaior + " (" + maiorBugs + " bugs)";
            texto += "\nDia com menos bugs: Dia " + diaMenor + " (" + menorBugs + " bugs)";

            document.getElementById("relatorio").value = texto;
        }
    </script>

</body>
</html>
